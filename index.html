<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0277bd">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="ASL îlot D">
    <meta name="application-name" content="ASL îlot D">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, max-image-preview:none, noimageindex">
    <meta name="description" content="Association Syndicale Libre îlot D Danube - Résidence Ambitions, Strasbourg">
    <meta property="og:url" content="https://asl-ilot-d.github.io/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="ASL îlot D">
    <meta property="og:description" content="Association Syndicale Libre îlot D Danube - Résidence Ambitions, Strasbourg">
    <meta property="og:image" content="https://asl-ilot-d.github.io/og_image.jpg">

    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <title>ASL îlot D</title>
    <style>
        :root {
            --primary-color: #0277bd;
            --secondary-color: rgb(168, 191, 71);
            --background-light: rgba(168, 191, 71, 0.1);
            --background-medium: rgba(168, 191, 71, 0.2);
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arial', sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--background-light);
            line-height: 1.6;
        }

        header {
            background-color: var(--background-medium);
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 0 0 auto;
        }

        .logo {
            height: 60px;
            margin-right: 15px;
        }

        .title-container {
            display: flex;
            align-items: center;
            text-align: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .title-container h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-left: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-image {
            width: 100%;
            max-height: 60vh;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .content {
            text-align: center;
            padding: 20px;
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 800px;
        }

        .content p {
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .content a {
            color: var(--secondary-color);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .content a:hover {
            text-decoration: underline;
        }

        .contact-button {
            display: inline-block;
            background-color: var(--secondary-color);
            color: white;
            padding: 12px 30px;
            text-align: center;
            text-decoration: none;
            font-size: 1rem;
            border-radius: 5px;
            margin: 10px;
            transition: background-color 0.3s, transform 0.2s;
        }

        .contact-button:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .title-container {
                flex-direction: column;
                text-align: center;
            }

            .title-container h1 {
                font-size: 1.2rem;
                margin-left: 0;
                margin-top: 10px;
            }

            .logo {
                margin-right: 0;
                margin-bottom: 10px;
            }

            .hero-image {
                max-height: 40vh;
            }

            .content p {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 10px;
            }

            .title-container h1 {
                font-size: 1rem;
            }

            .contact-button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="title-container">
            <img src="ASL.png" alt="Logo ASL îlot D" class="logo">
            <h1>Association Syndicale Libre<br>îlot D Danube</h1>
        </div>
    </header>
    <div class="container">
        <img src="a10.jpg" alt="Vue de la résidence Îlot D" class="hero-image">
        <div class="content">
            <p>Résidence Ambitions - Strasbourg quartier Danube</p>
            <p><a href="mentions.html">Mentions légales</a></p>
        </div>
    </div>
</body>
</html>
